<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Mutanha - criar conta" />
  <title>Mutanha - Register</title>
  <link rel="icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?display=swap&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Noto+Sans:wght@400;700&family=Playfair+Display:wght@600;700" />
  <link rel="stylesheet" href="../src/styles/style.css" />
  <link rel="stylesheet" href="../src/styles/auth-layout.css" />
</head>

<body class="auth-page" style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'>
  <main class="auth-shell">
    <section class="auth-hero" aria-label="Criar conta">
      <div class="auth-hero-copy">
        <a href="../index.html" class="auth-home-link">Voltar para Home</a>
        <div>
          <a href="../index.html" class="auth-brand">Mutanha</a>
          <h1>Cria a tua conta em minutos</h1>
          <p>Guarda favoritos, finaliza pedidos mais rapido e acompanha entregas.</p>
        </div>
      </div>
    </section>

    <section class="auth-form-wrap" aria-label="Formulario de registo">
      <p class="auth-kicker">NEW ACCOUNT</p>
      <h2>Registar</h2>
      <p class="auth-subtitle">Preenche os dados obrigatorios para comeþar.</p>

      <form id="register-form" class="auth-form" novalidate>
        <div class="auth-form-grid">
          <label class="auth-field">
            <span>Nome de utilizador *</span>
            <input id="username" name="username" type="text" required autocomplete="username" />
          </label>

          <label class="auth-field">
            <span>Nome completo *</span>
            <input id="full_name" name="full_name" type="text" required autocomplete="name" />
          </label>

          <label class="auth-field">
            <span>Email *</span>
            <input id="email" name="email" type="email" required autocomplete="email" />
          </label>

          <label class="auth-field">
            <span>Telefone</span>
            <input id="phone" name="phone" type="tel" autocomplete="tel" />
          </label>

          <label class="auth-field">
            <span>Senha *</span>
            <input id="password" name="password" type="password" required autocomplete="new-password" />
          </label>

          <label class="auth-field">
            <span>Confirmar senha *</span>
            <input id="confirm_password" name="confirm_password" type="password" required autocomplete="new-password" />
          </label>

          <label class="auth-field is-full">
            <span>Endereco</span>
            <textarea id="address" name="address" rows="2"></textarea>
          </label>

          <label class="auth-field">
            <span>Cidade</span>
            <input id="city" name="city" type="text" />
          </label>

          <label class="auth-field">
            <span>Estado</span>
            <input id="state" name="state" type="text" />
          </label>

          <label class="auth-field is-full">
            <span>Codigo postal</span>
            <input id="zip_code" name="zip_code" type="text" />
          </label>
        </div>

        <p id="register-feedback" class="auth-feedback hidden" aria-live="polite"></p>

        <button id="register-submit" type="submit" class="auth-submit">Criar conta</button>

        <p class="auth-switch">
          Ja tens conta?
          <a id="login-link" href="login.html">Fazer login</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    const API_BASE_URL = `${window.location.protocol}//${window.location.hostname}:3000/api`;
    const registerForm = document.getElementById('register-form');
    const submitButton = document.getElementById('register-submit');
    const feedback = document.getElementById('register-feedback');
    const loginLink = document.getElementById('login-link');

    const params = new URLSearchParams(window.location.search);
    const redirectParam = params.get('redirect');

    if (redirectParam && loginLink) {
      loginLink.href = `login.html?redirect=${encodeURIComponent(redirectParam)}`;
    }

    function getRedirectTarget() {
      if (!redirectParam) return '../index.html';
      if (redirectParam.startsWith('http://') || redirectParam.startsWith('https://')) {
        return '../index.html';
      }
      return redirectParam;
    }

    function setFeedback(message, type = 'error') {
      feedback.textContent = message;
      feedback.classList.remove('hidden', 'error', 'success');
      feedback.classList.add(type === 'success' ? 'success' : 'error');
    }

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const formData = new FormData(registerForm);
      const data = Object.fromEntries(formData.entries());

      if (data.password !== data.confirm_password) {
        setFeedback('As senhas nao coincidem.');
        return;
      }

      if ((data.password || '').length < 6) {
        setFeedback('A senha deve ter pelo menos 6 caracteres.');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'A criar conta...';

      try {
        const response = await fetch(`${API_BASE_URL}/register`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: data.username,
            email: data.email,
            password: data.password,
            full_name: data.full_name,
            phone: data.phone,
            address: data.address,
            city: data.city,
            state: data.state,
            zip_code: data.zip_code
          })
        });

        const result = await response.json();

        if (!response.ok) {
          setFeedback(result.error || 'Nao foi possivel criar a conta.');
          return;
        }

        if (result.token && result.user) {
          localStorage.setItem('userToken', result.token);
          localStorage.setItem('userData', JSON.stringify(result.user));
          localStorage.removeItem('authToken');
          localStorage.removeItem('adminLoggedIn');

          setFeedback('Conta criada com sucesso. A redirecionar...', 'success');
          setTimeout(() => {
            window.location.href = getRedirectTarget();
          }, 600);
          return;
        }

        setFeedback('Conta criada. Faz login para continuar.', 'success');
        setTimeout(() => {
          const target = redirectParam
            ? `login.html?redirect=${encodeURIComponent(redirectParam)}`
            : 'login.html';
          window.location.href = target;
        }, 700);
      } catch (error) {
        console.error('Erro no registo:', error);
        setFeedback('Erro ao conectar com o servidor.');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Criar conta';
      }
    });
  </script>
</body>

</html>
