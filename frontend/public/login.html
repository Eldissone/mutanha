<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111827" />
  <meta name="description" content="Mutanha - entrar na conta" />
  <title>Mutanha - Login</title>
  <link rel="icon" href="../favicon.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin />
  <link rel="stylesheet" as="style" onload="this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?display=swap&family=Plus+Jakarta+Sans:wght@400;500;700;800&family=Noto+Sans:wght@400;700&family=Playfair+Display:wght@600;700" />
  <link rel="stylesheet" href="../src/styles/style.css" />
  <link rel="stylesheet" href="../src/styles/auth-layout.css" />
</head>

<body class="auth-page" style='font-family: "Plus Jakarta Sans", "Noto Sans", sans-serif;'>
  <main class="auth-shell">
    <section class="auth-hero" aria-label="Boas-vindas">
      <div class="auth-hero-copy">
        <a href="../index.html" class="auth-home-link">Voltar para Home</a>
        <div>
          <a href="../index.html" class="auth-brand">Mutanha</a>
          <h1>Entra e continua a tua compra</h1>
          <p>Acede ao carrinho, acompanha pedidos e navega pelas novidades.</p>
        </div>
      </div>
    </section>

    <section class="auth-form-wrap" aria-label="Formulario de login">
      <p class="auth-kicker">AUTHENTICATION</p>
      <h2>Entrar</h2>
      <p class="auth-subtitle">Usa o teu email ou nome de utilizador.</p>

      <form id="login-form" class="auth-form" novalidate>
        <label class="auth-field">
          <span>Utilizador ou email</span>
          <input id="username" name="username" type="text" required autocomplete="username" placeholder="ex: joao@email.com" />
        </label>

        <label class="auth-field">
          <span>Senha</span>
          <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="Digite a sua senha" />
        </label>

        <p id="login-feedback" class="auth-feedback hidden" aria-live="polite"></p>

        <button id="login-submit" type="submit" class="auth-submit">Entrar</button>

        <p class="auth-switch">
          Nao tens conta?
          <a id="register-link" href="register.html">Criar conta</a>
        </p>
      </form>
    </section>
  </main>

  <script>
    const API_BASE_URL = `${window.location.protocol}//${window.location.hostname}:3000/api`;
    const loginForm = document.getElementById('login-form');
    const submitButton = document.getElementById('login-submit');
    const feedback = document.getElementById('login-feedback');
    const registerLink = document.getElementById('register-link');

    const params = new URLSearchParams(window.location.search);
    const redirectParam = params.get('redirect');

    if (redirectParam && registerLink) {
      registerLink.href = `register.html?redirect=${encodeURIComponent(redirectParam)}`;
    }

    function getRedirectTarget() {
      if (!redirectParam) return '../index.html';
      if (redirectParam.startsWith('http://') || redirectParam.startsWith('https://')) {
        return '../index.html';
      }
      return redirectParam;
    }

    function setFeedback(message, type = 'error') {
      feedback.textContent = message;
      feedback.classList.remove('hidden', 'error', 'success');
      feedback.classList.add(type === 'success' ? 'success' : 'error');
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        setFeedback('Preencha utilizador/email e senha.');
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = 'A entrar...';

      try {
        const response = await fetch(`${API_BASE_URL}/user/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (!response.ok) {
          setFeedback(result.error || 'Credenciais invalidas.');
          return;
        }

        if (result.user?.role === 'admin') {
          localStorage.setItem('authToken', result.token);
          localStorage.setItem('adminLoggedIn', 'true');
          localStorage.removeItem('userToken');
          localStorage.removeItem('userData');
          setFeedback('Login admin feito. A redirecionar...', 'success');
          setTimeout(() => {
            window.location.href = '../admin/index.html';
          }, 500);
          return;
        }

        localStorage.setItem('userToken', result.token);
        localStorage.setItem('userData', JSON.stringify(result.user));
        localStorage.removeItem('authToken');
        localStorage.removeItem('adminLoggedIn');

        setFeedback('Login feito com sucesso. A redirecionar...', 'success');
        setTimeout(() => {
          window.location.href = getRedirectTarget();
        }, 500);
      } catch (error) {
        console.error('Erro no login:', error);
        setFeedback('Erro ao conectar com o servidor.');
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = 'Entrar';
      }
    });
  </script>
</body>

</html>
